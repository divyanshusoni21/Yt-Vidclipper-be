<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{ projectName }}</title>
    <style>
        /* General Reset */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        table { border-collapse: collapse !important; }
        body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* Responsive Styles */
        @media screen and (max-width: 600px) {
            .container { width: 100% !important; }
            .content-padding { padding: 20px !important; }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f3f4f6;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%">
        <tr>
            <td align="center" style="padding: 40px 0;">
                <table border="0" cellpadding="0" cellspacing="0" width="600" class="container" style="background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                    <!-- Header -->
                    <tr>
                        <td align="center" style="padding: 40px 40px 20px 40px; border-bottom: 1px solid #f3f4f6;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center">
                                        <a href="{{ frontendDomain }}" target="_blank" style="text-decoration: none; color: #2563eb; font-size: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center;">
                                            {% if projectLogo %}
                                                <img src="{{ projectLogo }}" alt="{{ projectName }}" width="40" style="margin-right: 10px;">
                                            {% else %}
                                                <span style="background: #2563eb; color: #ffffff; width: 32px; height: 32px; border-radius: 8px; display: inline-block; line-height: 32px; text-align: center; margin-right: 10px; font-size: 18px;">C</span>
                                            {% endif %}
                                            <span style="color: #1f2937;">ClipTube</span>
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Main Content -->
                    <tr>
                        <td class="content-padding" style="padding: 40px;">
                            {% block content %}
                            {% endblock %}
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding: 40px; background-color: #111827; color: #9ca3af; font-size: 14px; text-align: center;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center" style="padding-bottom: 20px;">
                                        <a href="{{ frontendDomain }}" style="color: #ffffff; text-decoration: none; margin: 0 10px;">Home</a>
                                        <a href="{{ frontendDomain }}/#features" style="color: #ffffff; text-decoration: none; margin: 0 10px;">Features</a>
                                        <a href="{{ frontendDomain }}/#how-it-works" style="color: #ffffff; text-decoration: none; margin: 0 10px;">How It Works</a>
                                    </td>
                                </tr>
                                <tr>
                                    <td align="center" style="padding-bottom: 20px;">
                                        Questions or feedback? <a href="mailto:{{ adminEmail }}" style="color: #3b82f6; text-decoration: none;">{{ adminEmail }}</a>
                                    </td>
                                </tr>
                                <tr>
                                    <td align="center">
                                        &copy; {{ currentYear }} {{ projectName }}. All rights reserved.
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
